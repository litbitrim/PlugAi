<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game – HTML + CSS + JS</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; background:#222; color:#fff; }
  #game { 
    width: 400px; height: 400px; 
    margin: 40px auto; 
    border: 2px solid #555; 
    background:#111; 
    position:relative; 
  }
  .cell { 
    width: 20px; height: 20px; 
    box-sizing: border-box; 
    border: 1px solid #222; 
    position:absolute; 
  }
  .snake { background:#0f0; }
  .food { background:#f00; }
  #score { text-align:center; margin-top:10px; }
  #startBtn { display:block; margin:20px auto; padding:10px 20px; font-size:16px; }
</style>
</head>
<body>

<h1 style="text-align:center;">Snake Game</h1>
<div id="game"></div>
<div id="score">Score: 0</div>
<button id="startBtn">Start / Restart</button>

<script>
(() => {
  const game = document.getElementById('game');
  const scoreEl = document.getElementById('score');
  const startBtn = document.getElementById('startBtn');

  const CELL_SIZE = 20;          // px
  const GRID_SIZE = 20;          // 20x20 cells
  const SPEED = 200;             // ms per move

  let snake = [{x:10,y:10}];     // initial snake position
  let direction = {x:0, y:-1};   // moving up
  let food = null;
  let timer = null;
  let score = 0;
  let gameOver = false;

  function createGrid() {
    game.innerHTML = '';
    for (let y=0; y<GRID_SIZE; y++) {
      for (let x=0; x<GRID_SIZE; x++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.left = `${x*CELL_SIZE}px`;
        cell.style.top  = `${y*CELL_SIZE}px`;
        game.appendChild(cell);
      }
    }
  }

  function draw() {
    // clear previous snake & food
    const cells = game.querySelectorAll('.cell');
    cells.forEach(c => c.classList.remove('snake', 'food'));

    // draw snake
    snake.forEach(seg => {
      const idx = seg.y * GRID_SIZE + seg.x;
      cells[idx].classList.add('snake');
    });

    // draw food
    if (food) {
      const idx = food.y * GRID_SIZE + food.x;
      cells[idx].classList.add('food');
    }
  }

  function placeFood() {
    let empty = [];
    for (let y=0; y<GRID_SIZE; y++) {
      for (let x=0; x<GRID_SIZE; x++) {
        if (!snake.some(s => s.x===x && s.y===y)) {
          empty.push({x,y});
        }
      }
    }
    if (empty.length === 0) return; // no space left
    food = empty[Math.floor(Math.random()*empty.length)];
  }

  function move() {
    if (gameOver) return;

    const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

    // collision with walls
    if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
      endGame(); return;
    }

    // collision with self
    if (snake.some(s => s.x===head.x && s.y===head.y)) {
      endGame(); return;
    }

    snake.unshift(head);

    // eat food?
    if (food && head.x===food.x && head.y===food.y) {
      score += 1;
      scoreEl.textContent = `Score: ${score}`;
      placeFood();
    } else {
      snake.pop(); // normal move, remove tail
    }

    draw();
  }

  function endGame() {
    gameOver = true;
    clearInterval(timer);
    alert(`Game over! Final score: ${score}`);
  }

  function startGame() {
    snake = [{x:10,y:10}];
    direction = {x:0, y:-1};
    score = 0;
    gameOver = false;
    scoreEl.textContent = 'Score: 0';
    createGrid();
    placeFood();
    draw();
    clearInterval(timer);
    timer = setInterval(move, SPEED);
  }

  // keyboard controls
  document.addEventListener('keydown', e => {
    if (gameOver) return;
    switch(e.key) {
      case 'ArrowUp':
        if (direction.y !== 1) direction = {x:0, y:-1};
        break;
      case 'ArrowDown':
        if (direction.y !== -1) direction = {x:0, y:1};
        break;
      case 'ArrowLeft':
        if (direction.x !== 1) direction = {x:-1, y:0};
        break;
      case 'ArrowRight':
        if (direction.x !== -1) direction = {x:1, y:0};
        break;
    }
  });

  startBtn.addEventListener('click', startGame);

  // start automatically on load
  startGame();
})();
</script>
</body>
</html>
